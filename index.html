<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Recommender AI</title>
    <style>
        :root {
            --primary-color: #2563eb; /* Modern Blue */
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --user-msg: #2563eb;
            --bot-msg: #e5e7eb;
            --text-main: #1f2937;
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 600px;
            background: var(--chat-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: var(--primary-color);
            color: var(--text-light);
            padding: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-header span {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
        }

        .user-message {
            background: var(--user-msg);
            color: var(--text-light);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: var(--bot-msg);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: var(--chat-bg);
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
            transition: border 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:hover {
            background: #1d4ed8;
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Loading Dots Animation */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--bot-msg);
            padding: 12px 16px;
            border-radius: 15px;
            border-bottom-left-radius: 4px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #6b7280;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            Course Advisor AI
            <span>Here to help you pick the perfect classes</span>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <!-- Initial Greeting -->
            <div class="message bot-message">
                Hello! I am your student course recommender. Tell me about your major, interests, or what you want to learn!
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" class="chat-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatbox = document.getElementById("chat-messages");
        const userInput = document.getElementById("user-input");
        const typingIndicator = document.getElementById("typing-indicator");

        // Your exact Flowise API call
        async function query(data) {
            const response = await fetch(
                "https://cloud.flowiseai.com/api/v1/prediction/62831658-e1b5-4410-a99f-8b4a885d365b",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                }
            );
            const result = await response.json();
            return result;
        }

        function appendMessage(text, sender) {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message");
            messageDiv.classList.add(sender === "user" ? "user-message" : "bot-message");
            messageDiv.innerText = text;
            
            // Insert message before the typing indicator
            chatbox.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function showTyping() {
            typingIndicator.style.display = "block";
            chatbox.appendChild(typingIndicator); // Move to bottom
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.style.display = "none";
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show user message
            appendMessage(text, "user");
            userInput.value = "";
            
            // 2. Show typing indicator
            showTyping();

            try {
                // 3. Call your API
                const response = await query({"question": text});
                hideTyping();
                
                // Flowise usually returns the text inside a "text" key. 
                // We fallback to JSON stringify just in case the format changes.
                const botText = response.text || response.message || JSON.stringify(response);
                
                // 4. Show bot message
                appendMessage(botText, "bot");
            } catch (error) {
                hideTyping();
                console.error("Error communicating with AI:", error);
                appendMessage("Sorry, I am having trouble connecting to the server right now. Please try again later.", "bot");
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
