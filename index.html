<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Course Recommender</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

/* HERO */
.hero {
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');
  background-size:cover;
  padding:100px 20px;
  text-align:center;
}
.hero h1 { font-size:40px; }
.hero p { opacity:0.8; }

/* CARDS */
.cards {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:40px;
}
.card {
  width:260px;
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover { transform:scale(1.05); }
.card img { width:100%; }
.card div { padding:10px; }

/* CHAT BUTTON */
.chat-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  background:#0072ff;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:26px;
}

/* CHAT BOX */
.chat-box {
  position:fixed;
  bottom:100px;
  right:20px;
  width:360px;
  height:500px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  display:none;
  flex-direction:column;
}

/* CHAT */
.chat-body {
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.message {
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  max-width:75%;
}
.user { background:#0072ff; margin-left:auto; }
.bot { background:#333; }

/* FOOTER */
.chat-footer {
  display:flex;
}
.chat-footer input {
  flex:1;
  padding:10px;
  border:none;
}
.chat-footer button {
  padding:10px;
  border:none;
  background:#0072ff;
  color:white;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🎓 AI Course Assistant</h1>
  <p>Find the best courses with AI recommendations</p>
</div>

<div class="cards">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">
    <div>
      <h3>Machine Learning</h3>
      <p>⭐ 4.8 | ₹999</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
    <div>
      <h3>Web Development</h3>
      <p>⭐ 4.7 | ₹799</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1526378722484-bd91ca387e72">
    <div>
      <h3>Data Science</h3>
      <p>⭐ 4.9 | ₹1199</p>
    </div>
  </div>
</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
  <div class="chat-body" id="chat"></div>

  <div class="chat-footer">
    <input id="input" placeholder="Ask about courses..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

// FLOWISE API FUNCTION
async function query(data) {
    const response = await fetch(
        "https://cloud.flowiseai.com/api/v1/prediction/62831658-e1b5-4410-a99f-8b4a885d365b",
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        }
    );
    return response.json();
}

function toggleChat(){
  const box=document.getElementById("chatBox");
  box.style.display = box.style.display==="flex" ? "none" : "flex";
}

function add(role,text){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="message "+role;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  add("user", text);
  input.value="";

  const loading = document.createElement("div");
  loading.className="message bot";
  loading.innerText="Typing...";
  document.getElementById("chat").appendChild(loading);

  try{
    const response = await query({ question: text });

    loading.remove();
    add("bot", response.text || "No response");

  }catch{
    loading.innerText="Error connecting";
  }
}

document.getElementById("input").addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
