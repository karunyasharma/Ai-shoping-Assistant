<!DOCTYPE html>
<html>
<body>

<h2>AI Assistant</h2>

<input id="userInput" placeholder="Ask something..." />
<button onclick="send()">Send</button>

<p id="output"></p>

<script>
async function query(data) {
    const response = await fetch(
        "https://cloud.flowiseai.com/api/v1/prediction/62831658-e1b5-4410-a99f-8b4a885d365b",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        }
    );
    return response.json();
}

async function send() {
    const input = document.getElementById("userInput").value;

    const res = await query({ question: input });

    document.getElementById("output").innerText = res.text;
}
</script>

</body>
</html>
